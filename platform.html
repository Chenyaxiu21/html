<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>信火相传 · 信件管理中心</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; display: flex; }
    .sidebar {
      width: 220px; background: #0a1622; color: #fff; min-height: 100vh; padding: 24px 16px;
    }
    .sidebar h2 { font-size: 20px; margin-bottom: 32px; display: flex; align-items: center; gap: 8px; }
    .sidebar a { color: #aab4c0; text-decoration: none; display: block; padding: 10px 12px; border-radius: 8px; margin-bottom: 6px; }
    .sidebar a.active, .sidebar a:hover { background: #1e3b5a; color: #fff; }
    .main { flex: 1; padding: 24px 32px; overflow-y: auto; }
    .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .stat-card .number { font-size: 32px; font-weight: 700; color: #1e2f3f; }
    .stat-card .label { color: #6b7280; margin-top: 4px; }
    .filters { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 24px; display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .filter-group { display: flex; flex-direction: column; gap: 6px; }
    .filter-group label { font-size: 13px; color: #4b5563; font-weight: 500; }
    .filter-group select, .filter-group input { padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; }
    .table-container { background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 1200px; }
    th { background: #f9fafb; padding: 12px 10px; text-align: left; font-weight: 600; color: #374151; font-size: 13px; border-bottom: 1px solid #e5e7eb; white-space: nowrap; }
    td { padding: 12px 10px; border-bottom: 1px solid #f3f4f6; font-size: 13px; color: #1f2937; }
    .identity-tag { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; background: #e0e7ff; color: #3730a3; white-space: nowrap; }
    .degree-tag { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; background: #fce7f3; color: #9d174d; white-space: nowrap; }
    .reply-badge { background: #fef3c7; color: #92400e; padding: 2px 8px; border-radius: 12px; font-size: 11px; white-space: nowrap; }
    .replied { background: #d1fae5; color: #065f46; }
    .msg-preview { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; color: #2563eb; text-decoration: underline; }
    .btn { padding: 6px 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 12px; white-space: nowrap; }
    .btn-reply { background: #1e3b5a; color: #fff; }
    .btn-reply:disabled { background: #9ca3af; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: #fff; border-radius: 16px; padding: 24px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; position: relative; }
    .close { position: absolute; top: 12px; right: 16px; font-size: 24px; cursor: pointer; color: #6b7280; }
    .empty { text-align: center; padding: 48px; color: #9ca3af; }
    .download-link { color: #2563eb; text-decoration: underline; cursor: pointer; }
    .detail-row { margin-bottom: 10px; line-height: 1.6; }
    .detail-row strong { display: inline-block; width: 90px; color: #374151; }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>📮 信火相传</h2>
    <a href="#" class="active">📬 信件管理</a>
    <a href="#">⭐ 星火图鉴</a>
    <a href="#">📊 数据统计</a>
  </div>

  <div class="main">
    <h1 style="margin-bottom: 24px;">信件管理中心</h1>

    <!-- 统计卡片 -->
    <div class="stats">
      <div class="stat-card"><div class="number" id="totalCount">0</div><div class="label">总信件数</div></div>
      <div class="stat-card"><div class="number" id="todayCount">0</div><div class="label">今日新增</div></div>
      <div class="stat-card"><div class="number" id="unrepliedCount">0</div><div class="label">待回复</div></div>
      <div class="stat-card"><div class="number" id="sCount">0</div><div class="label">S级有声信</div></div>
    </div>

    <!-- 筛选区 -->
    <div class="filters">
      <div class="filter-group">
        <label>身份</label>
        <select id="filterIdentity">
          <option value="">全部</option>
          <option value="student">在校学生</option>
          <option value="parent">家长</option>
          <option value="other">其他</option>
        </select>
      </div>
      <div class="filter-group">
        <label>学历状态</label>
        <select id="filterDegree">
          <option value="">全部</option>
          <option value="undergraduate">本科在读</option>
          <option value="master">硕士在读</option>
          <option value="graduated">已毕业</option>
        </select>
      </div>
      <div class="filter-group">
        <label>专业 / 大学</label>
        <input type="text" id="filterKeyword" placeholder="搜索专业或院校...">
      </div>
      <div class="filter-group">
        <label>回信形式</label>
        <select id="filterReplyType">
          <option value="">全部</option>
          <option value="A">A级·电子信</option>
          <option value="S">S级·有声信</option>
        </select>
      </div>
      <div class="filter-group">
        <label>来源</label>
        <select id="filterSource">
          <option value="">全部</option>
          <option value="wechat">公众号推文</option>
          <option value="douyin">抖音短视频</option>
          <option value="senior">学长/老师推荐</option>
          <option value="other_source">其他</option>
        </select>
      </div>
      <div class="filter-group">
        <label>日期范围</label>
        <input type="date" id="filterDateFrom"> — <input type="date" id="filterDateTo">
      </div>
      <button class="btn btn-reply" id="applyFilter">应用筛选</button>
      <button class="btn" style="background:#e5e7eb;" id="resetFilter">重置</button>
    </div>

    <!-- 信件表格 -->
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>姓名</th>
            <th>身份</th>
            <th>学历</th>
            <th>专业</th>
            <th>所在大学</th>
            <th>心声摘要</th>
            <th>附件</th>
            <th>回信形式</th>
            <th>来源</th>
            <th>邮箱</th>
            <th>时间</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div class="empty" id="emptyHint" style="display:none;">暂无信件，等待你的第一封来信 ✉️</div>
    </div>
  </div>

  <!-- 详情弹窗 -->
  <div class="modal" id="detailModal">
    <div class="modal-content">
      <span class="close" id="closeModal">&times;</span>
      <h3>📨 信件详情</h3>
      <div id="modalContent" style="margin-top:16px;"></div>
    </div>
  </div>

  <script>
    // ===== 请替换成你自己的 JSONBin 凭据 =====
    const BIN_ID = '6a0525d8adc21f119a98caab';
    const MASTER_KEY = '$2a$10$lViKxa8mlqMOUQ5u0jAxIetNJPAAYIsFbAU2r7eAwmMLFAKJ4844W';

    async function getLetters() {
      try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
          headers: { 'X-Master-Key': MASTER_KEY }
        });
        if (!res.ok) throw new Error('读取失败');
        const data = await res.json();
        const record = data.record;
        if (Array.isArray(record)) return record;
        if (record && Array.isArray(record.letters)) return record.letters;
        return [];
      } catch (err) {
        console.error('获取信件出错：', err);
        return [];
      }
    }

    async function saveLetters(letters) {
      try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'X-Master-Key': MASTER_KEY
          },
          body: JSON.stringify(letters)
        });
        if (!res.ok) throw new Error('保存失败');
      } catch (err) {
        console.error('保存信件出错：', err);
      }
    }

    function formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    function getIdentityLabel(val, other) {
      if (val === 'student') return '在校学生';
      if (val === 'parent') return '家长';
      if (val === 'other') return other || '其他';
      return val || '未知';
    }

    function getDegreeLabel(val) {
      if (val === 'undergraduate') return '本科在读';
      if (val === 'master') return '硕士在读';
      if (val === 'graduated') return '已毕业';
      return val || '—';
    }

    function getSourceLabel(val) {
      const map = {
        'wechat': '公众号推文',
        'douyin': '抖音短视频',
        'senior': '学长/老师推荐',
        'other_source': '其他'
      };
      return map[val] || val || '—';
    }

    function downloadBase64File(dataUrl, fileName) {
      if (!dataUrl) return;
      const arr = dataUrl.split(',');
      if (arr.length < 2) return;
      const mime = arr[0].match(/:(.*?);/)?.[1] || 'application/octet-stream';
      const bstr = atob(arr[1]);
      let n = bstr.length;
      const u8arr = new Uint8Array(n);
      while (n--) {
        u8arr[n] = bstr.charCodeAt(n);
      }
      const blob = new Blob([u8arr], { type: mime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fileName || 'resume';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    let allLetters = [];

    function render(letters) {
      const tbody = document.getElementById('tableBody');
      const emptyHint = document.getElementById('emptyHint');
      if (!letters.length) {
        tbody.innerHTML = '';
        emptyHint.style.display = 'block';
      } else {
        emptyHint.style.display = 'none';
        tbody.innerHTML = letters.map((l) => {
          const key = l.id || `${l.email}||${l.timestamp}`;
          const hasResume = l.resumeFile && l.resumeFile.data ? '📎 有' : '—';
          return `
          <tr>
            <td>${l.nickname || '未署名'}</td>
            <td><span class="identity-tag">${getIdentityLabel(l.identity, l.otherIdentity)}</span></td>
            <td><span class="degree-tag">${getDegreeLabel(l.degreeStatus)}</span></td>
            <td>${l.major || '—'}</td>
            <td>${l.university || '—'}</td>
            <td class="msg-preview" onclick="showDetail('${key}')">${l.message ? l.message.slice(0,18) + '…' : '—'}</td>
            <td>${hasResume}</td>
            <td>${l.replyType === 'S' ? '<span class="reply-badge">S级有声</span>' : 'A级电子'}</td>
            <td>${getSourceLabel(l.source)}</td>
            <td>${l.email || '—'}</td>
            <td>${formatDate(l.timestamp)}</td>
            <td>${l.replied ? '<span class="reply-badge replied">已回复</span>' : '<span class="reply-badge">待回复</span>'}</td>
            <td>
              <button class="btn btn-reply" ${l.replied ? 'disabled' : ''} onclick="markReplied('${key}')">${l.replied ? '已回复' : '标记回复'}</button>
            </td>
          </tr>
        `}).join('');
      }
      updateStats(letters);
    }

    function updateStats(letters) {
      const total = letters.length;
      const today = new Date().toISOString().slice(0,10);
      const todayCount = letters.filter(l => l.timestamp && l.timestamp.startsWith(today)).length;
      const unreplied = letters.filter(l => !l.replied).length;
      const sCount = letters.filter(l => l.replyType === 'S').length;
      document.getElementById('totalCount').innerText = total;
      document.getElementById('todayCount').innerText = todayCount;
      document.getElementById('unrepliedCount').innerText = unreplied;
      document.getElementById('sCount').innerText = sCount;
    }

    async function loadAndApplyFilters() {
      allLetters = await getLetters();
      const identity = document.getElementById('filterIdentity').value;
      const degree = document.getElementById('filterDegree').value;
      const keyword = document.getElementById('filterKeyword').value.trim().toLowerCase();
      const replyType = document.getElementById('filterReplyType').value;
      const source = document.getElementById('filterSource').value;
      const dateFrom = document.getElementById('filterDateFrom').value;
      const dateTo = document.getElementById('filterDateTo').value;

      let filtered = [...allLetters];
      if (identity) filtered = filtered.filter(l => l.identity === identity);
      if (degree) filtered = filtered.filter(l => l.degreeStatus === degree);
      if (keyword) filtered = filtered.filter(l => 
        (l.major && l.major.toLowerCase().includes(keyword)) ||
        (l.university && l.university.toLowerCase().includes(keyword))
      );
      if (replyType) filtered = filtered.filter(l => l.replyType === replyType);
      if (source) filtered = filtered.filter(l => l.source === source);
      if (dateFrom) filtered = filtered.filter(l => l.timestamp >= dateFrom);
      if (dateTo) filtered = filtered.filter(l => l.timestamp <= dateTo + 'T23:59:59');

      render(filtered);
    }

    document.getElementById('applyFilter').addEventListener('click', loadAndApplyFilters);
    document.getElementById('resetFilter').addEventListener('click', async () => {
      document.getElementById('filterIdentity').value = '';
      document.getElementById('filterDegree').value = '';
      document.getElementById('filterKeyword').value = '';
      document.getElementById('filterReplyType').value = '';
      document.getElementById('filterSource').value = '';
      document.getElementById('filterDateFrom').value = '';
      document.getElementById('filterDateTo').value = '';
      await loadAndApplyFilters();
    });

    function showDetail(key) {
      const l = allLetters.find(letter => (letter.id || `${letter.email}||${letter.timestamp}`) === key);
      if (!l) return;

      let resumeHtml = '无';
      if (l.resumeFile && l.resumeFile.data) {
        const fname = l.resumeFile.name || '简历';
        resumeHtml = `<a class="download-link" onclick="downloadBase64File('${l.resumeFile.data.replace(/'/g, "\\'")}', '${fname}')">📥 下载简历 (${fname})</a>`;
      }

      const content = `
        <div class="detail-row"><strong>姓名：</strong>${l.nickname || '未署名'}</div>
        <div class="detail-row"><strong>身份：</strong>${getIdentityLabel(l.identity, l.otherIdentity)}</div>
        <div class="detail-row"><strong>学历：</strong>${getDegreeLabel(l.degreeStatus)}</div>
        <div class="detail-row"><strong>专业：</strong>${l.major || '未填'}</div>
        <div class="detail-row"><strong>所在大学：</strong>${l.university || '未填'}</div>
        <div class="detail-row"><strong>年龄：</strong>${l.age || '未填'}</div>
        <div class="detail-row"><strong>来源：</strong>${getSourceLabel(l.source)}</div>
        <div class="detail-row"><strong>推荐人：</strong>${l.referee || '无'}</div>
        <div class="detail-row"><strong>回信形式：</strong>${l.replyType === 'S' ? 'S级有声信' : 'A级电子信'}</div>
        <div class="detail-row"><strong>邮箱：</strong>${l.email}</div>
        <div class="detail-row"><strong>时间：</strong>${l.timestamp ? new Date(l.timestamp).toLocaleString() : ''}</div>
        <div class="detail-row"><strong>简历附件：</strong>${resumeHtml}</div>
        <div style="margin-top:12px;"><strong>心声：</strong></div>
        <div style="background:#f9fafb; padding:12px; border-radius:8px; white-space:pre-wrap; margin-top:6px;">${l.message || '(无内容)'}</div>
      `;
      document.getElementById('modalContent').innerHTML = content;
      document.getElementById('detailModal').style.display = 'flex';
    }

    document.getElementById('closeModal').addEventListener('click', () => {
      document.getElementById('detailModal').style.display = 'none';
    });
    window.addEventListener('click', (e) => {
      if (e.target === document.getElementById('detailModal')) {
        document.getElementById('detailModal').style.display = 'none';
      }
    });

    async function markReplied(key) {
      const idx = allLetters.findIndex(l => (l.id || `${l.email}||${l.timestamp}`) === key);
      if (idx !== -1) {
        allLetters[idx].replied = true;
        await saveLetters(allLetters);
        await loadAndApplyFilters();
      }
    }

    loadAndApplyFilters();

    setInterval(() => {
      loadAndApplyFilters();
    }, 30000);
  </script>
</body>
</html>
